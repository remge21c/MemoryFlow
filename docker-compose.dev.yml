services:
  postgres:
    image: postgres:16-alpine
    container_name: memoryflow-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: memoryflow
      POSTGRES_PASSWORD: memoryflow_dev_password
      POSTGRES_DB: memoryflow_dev
    ports:
      - "5432:5432"
    volumes:
      - memoryflow-postgres-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memoryflow -d memoryflow_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  memoryflow-postgres-dev:
