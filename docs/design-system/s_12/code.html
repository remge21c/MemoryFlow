<script>
        // Micro-interactions for the upload area
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');

        dropzone.addEventListener('click', () => fileInput.click());

        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('bg-primary-fixed', 'border-primary');
        });

        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('bg-primary-fixed', 'border-primary');
        });

        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('bg-primary-fixed', 'border-primary');
            alert('사진이 선택되었습니다. (데모)');
        });

        // Simple button click effect
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', function() {
                this.classList.add('brightness-90');
            });
            btn.addEventListener('touchend', function() {
                this.classList.remove('brightness-90');
            });
        });
    </script>
