<script>
        // Simple micro-interaction for the add button
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function(e) {
                if(this.innerText.includes('장면 추가')) {
                    const ripple = document.createElement('div');
                    ripple.className = 'absolute inset-0 bg-primary/5 rounded-xl pointer-events-none animate-ping';
                    this.style.position = 'relative';
                    this.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 500);
                }
            });
        });

        // Toggle focus state visualization
        const inputs = document.querySelectorAll('input, select');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.closest('.group')?.classList.add('ring-1', 'ring-primary/20');
            });
            input.addEventListener('blur', () => {
                input.closest('.group')?.classList.remove('ring-1', 'ring-primary/20');
            });
        });
