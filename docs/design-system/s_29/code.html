<script>
        // Micro-interactions for toggles
        document.querySelectorAll('input[type="checkbox"]').forEach(toggle => {
            toggle.addEventListener('change', (e) => {
                const statusPill = e.target.closest('.bg-white').querySelector('.font-label-sm.text-\\[10px\\]');
                if (e.target.checked) {
                    statusPill.textContent = '공개 중';
                    statusPill.className = 'bg-primary-fixed text-on-primary-fixed-variant px-2 py-0.5 rounded-full font-label-sm text-[10px] uppercase';
                } else {
                    statusPill.textContent = '비공개';
                    statusPill.className = 'bg-surface-variant text-on-surface-variant px-2 py-0.5 rounded-full font-label-sm text-[10px] uppercase';
                }
            });
        });

        // Simple upload simulation logic
        const uploadArea = document.querySelector('label[for="video-upload"]');
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('bg-secondary-container/20');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('bg-secondary-container/20');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('bg-secondary-container/20');
            alert('영상 업로드를 시작합니다.');
        });
    </script>
