</div>
<!-- Schedule Flow -->
<div class="space-y-stack-md">

</div>
<div class="w-7 h-7 rounded-full border-2 border-surface bg-primary text-on-primary flex items-center justify-center font-label-sm text-[10px]">
                            +13
                        </div>
</div>
</div>
</div>
<!-- Schedule Card 3 (Actionable Item) -->
<div class="bg-surface-container-lowest linen-shadow rounded-xl p-4 border border-primary/20">
<div class="flex gap-4">
<div class="flex flex-col items-center">
<span class="font-label-sm text-label-sm text-primary font-bold">15:00</span>
<div class="w-px flex-grow bg-primary/30 my-2"></div>
</div>
<div class="flex-grow">
<h3 class="font-title-sm text-title-sm text-on-surface">숙소 체크인 &amp; 휴식</h3>

<!-- Contextual FAB (Schedule Add) -->

</button>
<!-- Bottom Navigation Bar (As defined in Shared Components JSON) -->
<footer class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-2 pb-safe bg-surface dark:bg-surface border-t border-outline-variant/20 shadow-sm rounded-t-xl">
<button class="flex flex-col items-center justify-center text-on-secondary-container dark:text-on-secondary-fixed-variant transition-transform duration-150 scale-95 hover:bg-secondary-container/50">
<span class="material-symbols-outlined" data-icon="list_alt">list_alt</span>
<span class="font-label-sm text-label-sm">추억</span>
</button>
<button class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed-dim font-bold transition-transform duration-150 scale-95 hover:bg-secondary-container/50">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="font-label-sm text-label-sm">대시보드</span>
</button>
<button class="flex flex-col items-center justify-center text-on-secondary-container dark:text-on-secondary-fixed-variant transition-transform duration-150 scale-95 hover:bg-secondary-container/50">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-sm text-label-sm">프로필</span>
</button>
</footer>
<script>
        // Micro-interaction for tab switching
        document.querySelectorAll('nav button').forEach(button => {
            button.addEventListener('click', function() {
                // This is a visual demo only
                document.querySelectorAll('nav button').forEach(btn => {
                    btn.classList.remove('text-primary', 'font-bold');
                    btn.classList.add('text-on-surface-variant');
                    const indicator = btn.querySelector('span.absolute');
                    if(indicator) indicator.remove();
                });
                this.classList.add('text-primary', 'font-bold');
                this.classList.remove('text-on-surface-variant');
                this.innerHTML += '<span class="absolute bottom-0 left-0 w-full h-0.5 bg-primary rounded-full"></span>';
            });
        });

        // Interaction for schedule cards
        document.querySelectorAll('.bg-surface-container-lowest').forEach(card => {
            card.addEventListener('mousedown', () => card.style.backgroundColor = '#f1f1ef');
            card.addEventListener('mouseup', () => card.style.backgroundColor = '#ffffff');
            card.addEventListener('mouseleave', () => card.style.backgroundColor = '#ffffff');
        });
    </script>
</body></html>
