# S-26 스토리북 편집 ★핵심 화면 (관리자)
version: "2.0"
screen:
  name: 스토리북 편집
  route: /admin/projects/:id/storybook/scenes/:sid
  role: admin
  layout: scene-editor       # [확정 T-2] 장면 단위 편집 + 이전/다음 이동
  note: 제품의 심장. PRD 7장 "편집 화면 개념"을 그대로 구현. 모바일 우선.

data_requirements:
  - resource: storybook_scene     # 가상 리소스(집계)
    needs: [schedule, contributions, media, narration, scene_seconds, target_chars]
    filters: { project_id: ":id", schedule_id: ":sid" }
  - resource: scene_narrations
    action: upsert
    inputs: [schedule_id, narration_text]
  - resource: media
    action: update
    inputs: [id, included, sort_order]

components:
  - id: scene_nav
    type: pager
    position: top
    function: 이전/다음 장면 이동 + 현재 장면 표시(Day/제목)
  - id: media_selector
    type: media_toggle_grid
    position: main
    function: 사진/영상 포함·제외 토글(제외해도 흐리게 남아 되돌리기) + 드래그 정렬
    data_source: { resource: media }
    shows: [thumb, included_state, video_badge]
  - id: scene_length
    type: length_indicator
    position: main
    function: 예상 장면 길이 표시 = Σ(included photo×photo_seconds)+Σ(included video duration)
    extra: 사진 노출시간 장면별 덮어쓰기 입력
  - id: perspectives
    type: story_list
    position: main
    function: 관점별(A·B·C) 원본 스토리 표시(업로더 구분)
    data_source: { resource: contributions, needs: [uploader_name, story_text] }
  - id: ai_merge_button
    type: ai_action
    position: main
    label: 대본 초안 생성
    action: ai.mergeStories
    states: [idle, loading(≤30s), error]   # PRD 9장
  - id: narration_editor
    type: textarea_with_guide
    position: main
    function: 합쳐진 내레이션 편집. 적정 글자수 가이드(제안, 강제 아님)
    guide: target_chars (scene_seconds 기반), 초과해도 저장 허용
  - id: ai_summarize_button
    type: ai_action
    position: main
    label: 길이에 맞게 요약
    action: ai.summarizeToLength
    states: [idle, loading(≤30s), error]
  - id: ai_error
    type: inline_error
    position: main
    visible_when: AI 실패/타임아웃
    actions: [다시 시도]
    note: AI 실패해도 손으로 작성·저장 가능(편집 차단 금지, PRD 9장)

events:
  - on: toggle_media
    do: media.included 갱신 → scene_length 즉시 재계산
  - on: ai_merge / ai_summarize
    do: 서버 동기 호출 → 초안 별도 표시 → [적용] 눌러야 narration 반영
  - on: save_narration
    do: scene_narrations.upsert
  - on: locked
    do: 전체 읽기 전용(승인됨)

rules:
  - 두 레버 모두 허용: 화면 늘리기(미디어/노출시간) vs 글 줄이기(요약). 강요 없음
  - AI 결과는 초안. 최종 적용·확정은 사람

tests:
  - { name: 선별·길이, when: 사진 제외 토글, then: [scene_seconds 즉시 감소] }
  - { name: AI 합치기, when: 대본초안 생성, then: [초안 표시, 적용 전 narration 불변] }
  - { name: AI 실패, when: 타임아웃, then: [에러+다시시도, 손편집 가능] }
  - { name: 길이 제안, when: 내레이션 초과, then: [가이드 경고, 저장은 허용] }
  - { name: 잠금, when: 승인 후, then: [읽기 전용] }
