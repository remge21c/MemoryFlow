# S-11 프로젝트 일정 목록 (업로더)
version: "2.0"
screen:
  name: 프로젝트 일정 목록
  route: /projects/:id/schedules
  role: uploader
  layout: day-grouped-list   # [확정 T-1] Day별 리스트

data_requirements:
  - resource: schedules
    needs: [id, day_index, time, title, place, category, sort_order]
    filters: { project_id: ":id" }
    order: [day_index, sort_order]
  - resource: contributions
    needs: [schedule_id, uploader_id]
    filters: { project_id: ":id", uploader_id: "@me" }   # 본인 기여 유무 표시용

components:
  - id: day_sections
    type: grouped_list
    position: main
    group_by: day_index       # Day 1 / Day 2 ... 섹션
    function: Day별로 장면 목록 표시
    item: [time, title, place, category, my_contribution_badge]
  - id: locked_notice
    type: banner
    position: top
    visible_when: storybook approved 또는 is_edit_locked
    message: 편집이 잠겨 더 이상 업로드할 수 없습니다(읽기 전용)

events:
  - on: schedule_click
    do: /projects/:id/schedules/:sid/contribute 로 이동 (S-12)

tests:
  - { name: Day별 묶음, when: 진입, then: [day_index 오름차순 섹션, 각 섹션 sort_order 정렬] }
  - { name: 본인 기여 표시, when: 내가 올린 장면, then: [배지 표시] }
  - { name: 잠금 상태, when: 승인/편집잠금, then: [잠금 배너, 진입 시 읽기 전용] }
